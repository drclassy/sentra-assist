name: SRA — Sentra Reliability Agent

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  reliability-check:
    name: SRA Health Scan & Auto-Fix
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: SRA: Checkout Code
        uses: actions/checkout@v4
      
      - name: SRA: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: SRA: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - name: SRA: Diagnosis & Install
        run: |
          pnpm install --no-frozen-lockfile
          
      - name: SRA: Auto-Fix Execution
        run: |
          echo "SRA: Menjalankan perbaikan otomatis..."
          pnpm lint:fix || true
          pnpm format || true
          
      - name: SRA: Save & Push Changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "Sentra Reliability Agent (SRA)"
            git config user.email "sra@sentra.ai"
            git add .
            git commit -m "fix: auto-remediation by SRA (lint & format)"
            git push
            echo "✅ SRA: Perbaikan otomatis berhasil dikirim balik."
          else
            echo "✅ SRA: Tidak ada masalah yang perlu diperbaiki."
          fi

      - name: SRA Status Report
        if: failure()
        run: |
          echo "### 🚨 LAPORAN SRA: GAGAL TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "Chief, ada error yang SRA tidak bisa perbaiki sendiri. Tim developer harus turun tangan." >> $GITHUB_STEP_SUMMARY