name: Auto-Fix CI

on:
  workflow_run:
    # Ini harus sama persis dengan 'name' di file ci.yml Boss
    workflows: ['CI — Lint, Typecheck, Test & Build']
    types: [completed]
    branches: [main, master, develop, 'feature/**', 'fix/**']
  workflow_dispatch: # Tambahkan ini agar bisa muncul di daftar Actions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  auto-fix:
    name: Auto-Fix CI Failures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Hanya jalan kalau workflow CI utama statusnya 'failure' (gagal)
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # Mengambil branch yang sedang bermasalah
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "Avvcenna+ Auto-Fix Bot"
          git config user.email "bot@Avvcenna+.dev"

      - name: Fix — Prettier Format
        id: fix_format
        run: |
          # Mencoba merapikan kode, jika gagal tidak apa-apa (|| true)
          pnpm format 2>&1 || true

      - name: Fix — ESLint Auto-Fix
        id: fix_lint
        run: |
          # Mencoba memperbaiki error lint yang bisa diperbaiki otomatis
          pnpm lint:fix 2>&1 || true

      - name: Check for Changes
        id: check_changes
        run: |
          # Cek apakah ada file yang berubah setelah pnpm format/lint:fix
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit — failures require manual fix (like logic or types)"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected — preparing PR"
            git diff --stat
          fi

      - name: Create Pull Request with Fixes
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix(auto): Prettier + ESLint auto-fix from CI failure'
          branch: auto-fix/${{ github.event.workflow_run.head_branch }}
          base: ${{ github.event.workflow_run.head_branch }}
          title: 'Auto-Fix: Formatting & Linting'
          body: |
            ## 🤖 Auto-Fix Summary

            Boss, CI di branch `${{ github.event.workflow_run.head_branch }}` tadi gagal.
            Saya sudah mencoba memperbaiki masalah yang simpel otomatis:

            - ✅ Menjalankan `pnpm format` (Merapikan tulisan kode)
            - ✅ Menjalankan `pnpm lint:fix` (Memperbaiki aturan kode yang salah)

            Jika setelah PR ini di-merge CI masih gagal, berarti ada error **TypeScript** atau **Logika** yang harus Boss cek manual.

            [Klik di sini untuk lihat detail kegagalan CI tadi](${{ github.event.workflow_run.html_url }})

            ---
            *Generated by Avvcenna+ DevKit Auto-Fix Bot*
          labels: 'auto-fix,bot'
