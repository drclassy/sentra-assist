version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    # Grouping agar PR tidak nyampah
    groups:
      dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "SRA-Check-Required"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"