<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentra Assist — Console Boot Sequence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #050505;
      --bg-card: #0F1012;
      --neu-inset-bg: #0A0A0C;
      --text-main: #F4EFE6;
      --text-muted: #737373;
      --accent-med: #10B981;

      /* POWER STATE - 0 = off, 1 = on */
      --power-state: 0;

      /* Aluminium Edge System */
      --alum-light:     #F4F6F7;
      --alum-mid:       #C9CDD0;
      --alum-dark:      #9CA1A6;
      --alum-highlight: rgba(255, 255, 255, 0.9);
      --alum-shadow:    rgba(0, 0, 0, 0.08);

      /* Background gradient */
      --bg-start: #0b1220;
      --bg-end:   #172633;

      /* Input text — blue system */
      --text-input:       #00A3FF;
      --text-input-alt:   #4A90D9;
      --text-input-ph:    rgba(0, 163, 255, 0.40);
      --text-input-focus: rgba(0, 163, 255, 0.35);
      --text-input-sel:   rgba(0, 163, 255, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Selection + focus — blue coherent */
    ::selection { background-color: var(--text-input-sel); color: #fff; }
    *:focus-visible { outline: 2px solid var(--text-input-focus); outline-offset: 2px; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-start);
      background-image: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================
       POWER BUTTON (Always visible, pulsing)
       ============================================ */
    .power-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 100;
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .power-container.booted {
      top: 24px;
      right: 24px;
      left: auto;
      transform: none;
      flex-direction: row;
      gap: 8px;
    }

    .power-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--accent-med);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.4s ease;
      opacity: calc(0.3 + var(--power-state) * 0.7);
    }

    .power-btn::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent-med);
      border-right-color: var(--accent-med);
      opacity: 0.3;
      animation: power-pulse 2s ease-in-out infinite;
    }

    @keyframes power-pulse {
      0%, 100% { transform: rotate(0deg); opacity: 0.2; }
      50% { transform: rotate(180deg); opacity: 0.5; }
    }

    .power-icon {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: var(--accent-med);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 calc(8px * var(--power-state)) var(--accent-med));
      transition: filter 0.4s ease;
    }

    .power-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: calc(0.5 + var(--power-state) * 0.5);
      transition: opacity 0.4s ease;
    }

    .power-container.booted .power-btn {
      width: 36px;
      height: 36px;
      border-width: 1px;
    }

    .power-container.booted .power-icon {
      width: 16px;
      height: 16px;
    }

    .power-container.booted .power-label {
      font-size: 8px;
    }

    /* ============================================
       MAIN CARD - Console
       ============================================ */
    .sentra-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border-radius: 16px;
      padding: 18px 22px 20px;
      border: 1px solid rgba(201, 205, 208, calc(0.04 + var(--power-state) * 0.14));
      position: relative;
      overflow: hidden;
      margin: 0 20px;

      /* Aluminium edge shadows — directional metallic lighting */
      box-shadow:
        /* Outer aluminium rim */
        0 0 0 0.5px rgba(156, 161, 166, calc(0.12 * var(--power-state))),
        /* Top-left catch light */
        calc(-1px * var(--power-state)) calc(-1px * var(--power-state)) calc(2px * var(--power-state)) rgba(244, 246, 247, calc(0.06 * var(--power-state))),
        /* Bottom-right shadow edge */
        calc(1px * var(--power-state)) calc(1px * var(--power-state)) calc(3px * var(--power-state)) rgba(0, 0, 0, calc(0.25 * var(--power-state))),
        /* Deep drop */
        0 calc(20px * var(--power-state)) calc(40px * var(--power-state)) rgba(0, 0, 0, calc(0.8 * var(--power-state))),
        /* Inner aluminium reflections */
        inset 0 1px 0 rgba(244, 246, 247, calc(0.08 * var(--power-state))),
        inset 1px 0 0 rgba(244, 246, 247, calc(0.04 * var(--power-state))),
        inset 0 -1px 0 rgba(0, 0, 0, calc(0.12 * var(--power-state))),
        inset -1px 0 0 rgba(0, 0, 0, calc(0.06 * var(--power-state)));

      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Top shimmer — aluminium highlight strip */
    .sentra-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 5%,
        rgba(201, 205, 208, calc(0.25 * var(--power-state))) 30%,
        rgba(244, 246, 247, calc(0.35 * var(--power-state))) 50%,
        rgba(201, 205, 208, calc(0.25 * var(--power-state))) 70%,
        transparent 95%
      );
      transition: background 0.6s ease;
    }

    /* Aluminium gradient ring — full perimeter */
    .sentra-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        145deg,
        rgba(244, 246, 247, calc(0.22 * var(--power-state))) 0%,
        rgba(201, 205, 208, calc(0.14 * var(--power-state))) 35%,
        rgba(156, 161, 166, calc(0.08 * var(--power-state))) 65%,
        rgba(60, 63, 66, calc(0.12 * var(--power-state))) 100%
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 11;
      transition: opacity 0.6s ease;
    }

    /* ============================================
       HEADER - Staggered boot animation
       ============================================ */
    .card-header {
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo-container { 
      display: flex; 
      flex-direction: column; 
      align-items: flex-start;
      opacity: var(--power-state);
      transform: translateY(calc(10px * (1 - var(--power-state))));
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1) calc(0.1s * var(--power-state));
    }

    .logo-svg {
      width: 50px;
      height: auto;
      opacity: calc(0.1 + var(--power-state) * 0.6);
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
      transition: opacity 0.6s ease calc(0.2s * var(--power-state));
    }

    .version-badge {
      font-size: 6px;
      font-weight: 700;
      color: var(--accent-med);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
      opacity: calc(0.2 * var(--power-state));
      transition: opacity 0.4s ease calc(0.4s * var(--power-state));
    }

    .title-group { 
      text-align: center; 
      flex: 1;
      opacity: var(--power-state);
      transform: translateY(calc(15px * (1 - var(--power-state))));
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) calc(0.2s * var(--power-state));
    }

    .card-title-main {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #F4EFE6 0%, #CFC6B8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: calc(0.3 + var(--power-state) * 0.7);
      filter: blur(calc(4px * (1 - var(--power-state))));
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1) calc(0.3s * var(--power-state));
    }

    .card-title-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      opacity: calc(0.2 + var(--power-state) * 0.8);
      transition: opacity 0.6s ease calc(0.5s * var(--power-state));
    }

    /* Spacer (hidden) */
    .spacer { width: 50px; opacity: 0; }

    /* ============================================
       ENGINE BUTTONS - Boot up staggered
       ============================================ */
    .engine-row { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 8px; 
      margin-bottom: 12px; 
    }

    .engine-btn {
      padding: 10px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,calc(0.03 + var(--power-state) * 0.05));
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      position: relative;
      overflow: hidden;
      
      /* Text dim saat mati */
      color: rgba(115,115,115,calc(0.2 + var(--power-state) * 0.8));
      
      /* Shadows muncul saat nyala */
      box-shadow: 
        calc(3px * var(--power-state)) calc(3px * var(--power-state)) calc(6px * var(--power-state)) rgba(0,0,0,calc(0.5 * var(--power-state))),
        calc(-1px * var(--power-state)) calc(-1px * var(--power-state)) calc(3px * var(--power-state)) rgba(255,255,255,calc(0.03 * var(--power-state)));
      
      opacity: calc(0.3 + var(--power-state) * 0.7);
      transform: translateY(calc(8px * (1 - var(--power-state))));
      filter: blur(calc(2px * (1 - var(--power-state))));
      
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Staggered delays untuk tiap button */
    .engine-btn:nth-child(1) { transition-delay: calc(0.6s * var(--power-state)); }
    .engine-btn:nth-child(2) { transition-delay: calc(0.7s * var(--power-state)); }
    .engine-btn:nth-child(3) { transition-delay: calc(0.8s * var(--power-state)); }

    .engine-btn:hover {
      color: rgba(244,239,230,var(--power-state));
      border-color: rgba(255,255,255,calc(0.1 * var(--power-state)));
    }

    .engine-btn.active {
      color: rgba(244,239,230,var(--power-state));
      border-color: rgba(16,185,129,var(--power-state));
      box-shadow: 
        0 0 calc(12px * var(--power-state)) rgba(16,185,129,calc(0.2 * var(--power-state))),
        inset 0 1px 0 rgba(255,255,255,calc(0.05 * var(--power-state)));
    }

    /* ============================================
       STATUS BAR - Last to boot
       ============================================ */
    .status-bar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      background: var(--neu-inset-bg);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,calc(0.02 + var(--power-state) * 0.04));
      
      box-shadow: 
        inset calc(2px * var(--power-state)) calc(2px * var(--power-state)) calc(6px * var(--power-state)) rgba(0,0,0,calc(0.4 * var(--power-state))),
        inset calc(-1px * var(--power-state)) calc(-1px * var(--power-state)) calc(2px * var(--power-state)) rgba(255,255,255,calc(0.02 * var(--power-state)));
      
      opacity: calc(0.2 + var(--power-state) * 0.8);
      transform: scale(calc(0.98 + var(--power-state) * 0.02));
      
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) calc(0.9s * var(--power-state));
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status-item { display: flex; align-items: center; gap: 8px; }

    .status-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: calc(0.3 + var(--power-state) * 0.7);
      transition: opacity 0.4s ease calc(1.0s * var(--power-state));
    }

    .status-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-main);
      opacity: calc(0 + var(--power-state));
      transform: translateX(calc(-5px * (1 - var(--power-state))));
      transition: all 0.5s ease calc(1.1s * var(--power-state));
    }

    /* Numbers scramble effect placeholder */
    .status-value::before {
      content: '---';
      position: absolute;
      opacity: calc(1 - var(--power-state));
      transition: opacity 0.3s ease calc(1.0s * var(--power-state));
    }

    .status-indicator { 
      display: flex; 
      align-items: center; 
      gap: 6px;
      opacity: var(--power-state);
      transition: opacity 0.4s ease calc(1.2s * var(--power-state));
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-med);
      box-shadow: 0 0 calc(6px * var(--power-state)) var(--accent-med);
      opacity: var(--power-state);
      transform: scale(var(--power-state));
      transition: all 0.4s ease calc(1.3s * var(--power-state));
    }

    .status-text {
      font-size: 10px;
      color: var(--accent-med);
      font-weight: 500;
      opacity: calc(0 + var(--power-state));
      transition: opacity 0.3s ease calc(1.4s * var(--power-state));
    }

    /* ============================================
       VITALS - Hidden when off
       ============================================ */
    .console-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,calc(0.06 * var(--power-state))), transparent);
      margin: 16px 0;
      opacity: var(--power-state);
      transition: all 0.5s ease calc(1.0s * var(--power-state));
    }

    .console-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      opacity: calc(0.2 + var(--power-state) * 0.8);
      transform: translateX(calc(-10px * (1 - var(--power-state))));
      transition: all 0.5s ease calc(1.1s * var(--power-state));
    }

    .vitals-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 10px; 
      margin-bottom: 12px; 
    }

    .vital-item {
      background: var(--neu-inset-bg);
      border: 1px solid rgba(255,255,255,calc(0.02 + var(--power-state) * 0.03));
      border-radius: 10px;
      padding: 12px;
      opacity: calc(0.2 + var(--power-state) * 0.8);
      transform: translateY(calc(15px * (1 - var(--power-state))));
      box-shadow: 
        inset calc(2px * var(--power-state)) calc(2px * var(--power-state)) calc(6px * var(--power-state)) rgba(0,0,0,calc(0.4 * var(--power-state))),
        inset calc(-1px * var(--power-state)) calc(-1px * var(--power-state)) calc(2px * var(--power-state)) rgba(255,255,255,calc(0.015 * var(--power-state)));
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Staggered vitals */
    .vital-item:nth-child(1) { transition-delay: calc(1.2s * var(--power-state)); }
    .vital-item:nth-child(2) { transition-delay: calc(1.3s * var(--power-state)); }
    .vital-item:nth-child(3) { transition-delay: calc(1.4s * var(--power-state)); }
    .vital-item:nth-child(4) { transition-delay: calc(1.5s * var(--power-state)); }

    .vital-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      opacity: calc(0.3 + var(--power-state) * 0.7);
      transition: opacity 0.4s ease;
    }

    .vital-value { display: flex; align-items: baseline; gap: 4px; }

    .vital-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-input);
      caret-color: var(--text-input);
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(201,205,208,calc(0.1 * var(--power-state)));
      width: 60px;
      text-align: center;
      padding: 2px;
      opacity: calc(0 + var(--power-state));
      transform: scale(calc(0.9 + var(--power-state) * 0.1));
      transition: color 0.15s ease, opacity 0.4s ease, transform 0.4s ease;
    }

    /* Placeholder saat mati */
    .vital-number::placeholder {
      color: transparent;
      opacity: calc(1 - var(--power-state));
    }

    .vital-unit {
      font-size: 10px;
      color: var(--text-muted);
      opacity: calc(0.2 + var(--power-state) * 0.8);
      transition: opacity 0.4s ease;
    }

    /* ============================================
       ACTION BUTTONS - Last to appear
       ============================================ */
    .action-bar { 
      display: flex; 
      gap: 10px; 
      opacity: var(--power-state);
      transform: translateY(calc(20px * (1 - var(--power-state))));
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) calc(1.6s * var(--power-state));
    }

    .btn-secondary {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: rgba(115,115,115,var(--power-state));
      border: 1px solid rgba(255,255,255,calc(0.05 * var(--power-state)));
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      color: rgba(244,239,230,var(--power-state));
      border-color: rgba(255,255,255,calc(0.1 * var(--power-state)));
    }

    .btn-primary {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: rgba(255,255,255,var(--power-state));
      color: rgba(0,0,0,var(--power-state));
      box-shadow: 0 0 calc(15px * var(--power-state)) rgba(255,255,255,calc(0.15 * var(--power-state)));
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* OFF STATE OVERLAY */
    .off-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,5,5,calc(0.7 * (1 - var(--power-state))));
      pointer-events: none;
      z-index: 5;
      transition: background 0.8s ease;
    }

    /* ============================================
       LOGIN FORM - 2 Garis Halus
       ============================================ */
    .login-section {
      margin: 16px 0;
      opacity: var(--power-state);
      transform: translateY(calc(20px * (1 - var(--power-state))));
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) calc(1.0s * var(--power-state));
    }

    .login-divider {
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,calc(0.1 * var(--power-state))) 50%, 
        transparent
      );
      margin: 12px 0;
      transition: background 0.5s ease;
    }

    .login-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      opacity: calc(0.3 + var(--power-state) * 0.7);
      transition: opacity 0.4s ease calc(1.1s * var(--power-state));
    }

    .input-line {
      position: relative;
      margin-bottom: 16px;
    }

    .input-line input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(201,205,208,calc(0.1 + var(--power-state) * 0.15));
      padding: 10px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: rgba(0,163,255,var(--power-state));
      caret-color: var(--text-input);
      outline: none;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .input-line input::placeholder {
      color: rgba(0,163,255,calc(0.25 * var(--power-state)));
      font-style: italic;
    }

    .input-line input:focus {
      border-bottom-color: rgba(0,163,255,calc(0.6 * var(--power-state)));
    }

    /* Garis halus animasi saat focus — blue glow */
    .input-line::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--text-input);
      box-shadow: 0 0 8px var(--text-input);
      transition: width 0.3s ease;
    }

    .input-line input:focus ~ .input-glow,
    .input-line input:not(:placeholder-shown) ~ .input-glow {
      width: 100%;
    }

    .input-glow {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1px;
      width: 0;
      background: var(--text-input);
      box-shadow: 0 0 6px var(--text-input);
      transition: width 0.3s ease;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: rgba(16,185,129,var(--power-state));
      color: rgba(0,0,0,var(--power-state));
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 8px;
      opacity: var(--power-state);
      transform: translateY(calc(10px * (1 - var(--power-state))));
      transition: all 0.4s ease calc(1.3s * var(--power-state));
    }

    .login-btn:hover {
      background: rgba(16,185,129,calc(var(--power-state) * 0.9));
      box-shadow: 0 0 calc(15px * var(--power-state)) rgba(16,185,129,0.3);
    }
  </style>
</head>
<body>
  <!-- POWER BUTTON -->
  <div class="power-container" id="powerContainer">
    <button class="power-btn" id="powerBtn" title="Power On">
      <svg class="power-icon" viewBox="0 0 24 24">
        <path d="M12 2v8M8 6a8 8 0 1 0 8 0"/>
      </svg>
    </button>
    <span class="power-label" id="powerLabel">SYSTEM OFF</span>
  </div>

  <!-- MAIN CONSOLE -->
  <div class="sentra-card" id="console">
    <div class="off-overlay"></div>
    
    <div class="card-header">
      <div class="header-top">
        <div class="logo-container">
          <svg class="logo-svg" viewBox="0 0 60 40" fill="none">
            <text x="0" y="28" fill="#F4EFE6" fontSize="24" fontWeight="700" fontFamily="Inter">S</text>
            <circle cx="32" cy="20" r="14" stroke="#F4EFE6" strokeWidth="2" fill="none"/>
            <circle cx="32" cy="20" r="5" fill="#F4EFE6"/>
          </svg>
          <span class="version-badge">MedPro</span>
        </div>
        <div class="title-group">
          <h1 class="card-title-main">Sentra Assist</h1>
          <p class="card-title-sub">Architected by dr Ferdi Iskandar</p>
        </div>
        <div class="spacer"></div>
      </div>

      <div class="engine-row">
        <button class="engine-btn active" data-engine="vs">VS Inference</button>
        <button class="engine-btn" data-engine="emergency">Emergency</button>
        <button class="engine-btn" data-engine="settings">Pengaturan</button>
      </div>

      <div class="status-bar">
        <div class="status-row">
          <div class="status-item">
            <span class="status-label">Nama</span>
            <span class="status-value">Budi Santoso</span>
          </div>
          <div class="status-item">
            <span class="status-label">Usia</span>
            <span class="status-value">45 tahun</span>
          </div>
          <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-text">Ready</span>
          </div>
        </div>
        <div class="status-row">
          <div class="status-item">
            <span class="status-label">Riwayat</span>
            <span class="status-value">DM, Hipertensi</span>
          </div>
        </div>
      </div>
    </div>

    <div class="console-divider"></div>

    <!-- LOGIN SECTION - 2 Garis Halus -->
    <div class="login-section" id="loginSection">
      <div class="login-label">Secure Login</div>
      
      <div class="input-line">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <div class="input-glow"></div>
      </div>
      
      <div class="input-line">
        <input type="password" id="password" placeholder="Password">
        <div class="input-glow"></div>
      </div>
      
      <button class="login-btn" id="loginBtn">Access Console</button>
    </div>

    <div class="login-divider"></div>

    <div class="console-section" id="vitalsSection" style="opacity: calc(var(--power-state) * var(--logged-in, 0)); display: var(--show-vitals, none);">
      <div class="console-label">Vital Signs</div>
      <div class="vitals-grid">
        <div class="vital-item">
          <div class="vital-label">Tekanan Darah</div>
          <div class="vital-value">
            <input type="text" class="vital-number" value="120/80" readonly>
            <span class="vital-unit">mmHg</span>
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">Gula Darah</div>
          <div class="vital-value">
            <input type="text" class="vital-number" value="110" readonly>
            <span class="vital-unit">mg/dL</span>
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">Nadi</div>
          <div class="vital-value">
            <input type="text" class="vital-number" value="72" readonly>
            <span class="vital-unit">bpm</span>
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">SpO2</div>
          <div class="vital-value">
            <input type="text" class="vital-number" value="98" readonly>
            <span class="vital-unit">%</span>
          </div>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn-secondary">Reset</button>
        <button class="btn-primary">Analyze</button>
      </div>
    </div>
  </div>

  <script>
    const powerBtn = document.getElementById('powerBtn');
    const powerContainer = document.getElementById('powerContainer');
    const powerLabel = document.getElementById('powerLabel');
    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const vitalsSection = document.getElementById('vitalsSection');
    const root = document.documentElement;
    
    let isPowered = false;
    let isLoggedIn = false;

    powerBtn.addEventListener('click', () => {
      isPowered = !isPowered;
      
      // Update CSS variable for smooth transitions
      root.style.setProperty('--power-state', isPowered ? 1 : 0);
      
      // Move power button to corner
      if (isPowered) {
        powerContainer.classList.add('booted');
        powerLabel.textContent = 'ON';
        
        // Focus username after boot
        setTimeout(() => {
          usernameInput.focus();
        }, 1200);
      } else {
        powerContainer.classList.remove('booted');
        powerLabel.textContent = 'SYSTEM OFF';
        isLoggedIn = false;
        root.style.setProperty('--logged-in', 0);
        vitalsSection.style.display = 'none';
        usernameInput.value = '';
        passwordInput.value = '';
      }
    });

    // Login handler
    loginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (!isPowered) return;
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      
      if (!username || !password) {
        // Shake animation for error
        loginBtn.style.transform = 'translateX(-5px)';
        setTimeout(() => loginBtn.style.transform = 'translateX(5px)', 50);
        setTimeout(() => loginBtn.style.transform = 'translateX(0)', 100);
        return;
      }
      
      // Success - show vitals
      isLoggedIn = true;
      root.style.setProperty('--logged-in', 1);
      vitalsSection.style.display = 'block';
      
      // Typing effect for vitals
      setTimeout(() => {
        document.querySelectorAll('.vital-number').forEach((input, i) => {
          const finalValue = input.value;
          input.value = '';
          let charIndex = 0;
          const typeChar = () => {
            if (charIndex < finalValue.length) {
              input.value += finalValue[charIndex];
              charIndex++;
              setTimeout(typeChar, 40 + i * 15);
            }
          };
          setTimeout(typeChar, 200 + i * 80);
        });
      }, 300);
    });

    // Enter key on password
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginBtn.click();
      }
    });

    // Engine button interaction (only works when powered and logged in)
    document.querySelectorAll('.engine-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (!isPowered || !isLoggedIn) return;
        document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
