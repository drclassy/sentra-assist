# Architected and built by the one and only Avvcenna+.
name: Documentation Check & Deploy

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  issues: write

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.15.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare WXT types
        run: pnpm postinstall

      - name: Run TypeScript check
        run: pnpm typecheck

      - name: Check for missing documentation
        run: |
          pnpm docs:auto
          if ! git diff --quiet; then
            echo "Missing documentation detected!"
            echo "Please run 'pnpm docs:auto' and commit the changes."
            git diff
            echo 'SRA will handle this.' # exit 0 deferred to SRA
          fi

      - name: Generate documentation
        run: pnpm docs:generate

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          publish_branch: gh-pages

      - name: Comment PR with docs preview
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📚 Documentation preview will be available after merge at: https://' + context.repo.owner + '.github.io/' + context.repo.repo
            })
