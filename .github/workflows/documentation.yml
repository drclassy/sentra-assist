# Architected and built by the one and only Avvcenna+.
name: Documentation Check & Deploy

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  issues: write

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.16.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11.5.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare WXT types
        run: pnpm postinstall

      - name: Run TypeScript check
        run: pnpm typecheck

      - name: Check for missing documentation
        run: |
          pnpm docs:auto
          if ! git diff --quiet; then
            echo "Missing documentation detected!"
            echo "Please run 'pnpm docs:auto' and commit the changes."
            git diff
            echo 'SRA will handle this.' # exit 0 deferred to SRA
          fi

      - name: Generate documentation
        run: pnpm docs:generate

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          publish_branch: gh-pages

      - name: Comment PR with docs preview
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📚 Documentation preview will be available after merge at: https://' + context.repo.owner + '.github.io/' + context.repo.repo
            })
