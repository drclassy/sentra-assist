name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        if: github.event.before != '' && github.event.before != github.sha
        uses: trufflesecurity/trufflehog@d86254ee022cc6533192c5601c143a42706c1004 # main
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified
        continue-on-error: true

  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only runs when a Dockerfile is present in the repo
    if: github.event_name == 'push' && hashFiles('**/Dockerfile') != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Find Dockerfile
        id: find_dockerfile
        run: |
          DOCKERFILE=$(find . -name "Dockerfile" | head -1)
          echo "path=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "Found Dockerfile at: $DOCKERFILE"

      - name: Build Docker Image
        run: |
          docker build -f ${{ steps.find_dockerfile.outputs.path }} -t project-scan:${{ github.sha }} .
        continue-on-error: true

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          image-ref: 'project-scan:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
