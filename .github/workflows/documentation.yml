# Architected and built by the one and only Claudesy.
name: Documentation Check & Deploy

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  issues: write

jobs:
  documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare WXT types
        run: pnpm postinstall

      - name: Run TypeScript check
        run: pnpm typecheck

      - name: Check for missing documentation
        run: |
          pnpm docs:auto
          if ! git diff --quiet; then
            echo "Missing documentation detected!"
            echo "Please run 'pnpm docs:auto' and commit the changes."
            git diff
            exit 1
          fi

      - name: Generate documentation
        run: pnpm docs:generate

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api
          publish_branch: gh-pages

      - name: Comment PR with docs preview
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📚 Documentation preview will be available after merge at: https://' + context.repo.owner + '.github.io/' + context.repo.repo
            })
